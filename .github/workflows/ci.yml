name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trustcopilot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure no secrets files are committed
        run: |
          TRACKED=$(git ls-files | grep -E '^\.env$|^apps/api/\.env$' || true)
          if [ -n "$TRACKED" ]; then
            echo "ERROR: The following env files must not be committed: $TRACKED"
            exit 1
          fi
          echo "No committed .env files found."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: apps/web
        run: npm install

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files

      - name: Install backend deps
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustcopilot_test
        run: |
          pip install -U pip
          pip install ruff pytest
          pip install -e .

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustcopilot_test
        run: alembic upgrade head

      - name: Lint backend
        working-directory: apps/api
        run: |
          ruff check .

      - name: Run backend tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustcopilot_test
          SESSION_SECRET: test-secret
        run: pytest

      - name: Build frontend
        working-directory: apps/web
        run: npm run build
