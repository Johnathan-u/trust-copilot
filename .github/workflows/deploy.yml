# CD: Build production images and deploy (deploy target is TBD; configure secrets in GitHub).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API (production target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: false
          load: true
          tags: trust-copilot-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web (production target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: false
          load: true
          tags: trust-copilot-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to [TBD]: Configure your target (VM, ECS, Fly, Render, etc.) and required secrets.
  # Example secrets: DEPLOY_HOST, DEPLOY_SSH_KEY, or provider-specific (FLY_API_TOKEN, etc.).
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy (placeholder)
        run: |
          echo "Deploy target is not yet configured."
          echo "To enable deployment:"
          echo "  1. Choose a target (VM, ECS, Fly.io, Render, etc.)."
          echo "  2. Add the required secrets to this repo (e.g. DEPLOY_HOST, DEPLOY_SSH_KEY, or provider token)."
          echo "  3. Replace this step with the actual deploy command or action."
          echo "Production images were built in the build job; they can be pushed to a registry and deployed from there."
